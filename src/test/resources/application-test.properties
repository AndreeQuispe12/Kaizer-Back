spring.datasource.url=jdbc:h2:mem:kaizer_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

app.cors.allowed-origins=http://localhost:5173

app.jwt.secret=0123456789abcdef0123456789abcdef0123456789abcdef
app.jwt.expiration-minutes=60

# Token vacío en tests: los servicios de integración se mockean y nunca llaman a la API real
app.integration.decolecta.url=https://api.decolecta.com
app.integration.decolecta.token=test-token
